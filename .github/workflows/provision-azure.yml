name: Provision Azure Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'prod' }}
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}

jobs:
  provision:
    runs-on: ${{ fromJSON(vars.RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Derive resource names
        shell: bash
        run: |
          repo_token="$(printf '%s' "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-10)"
          env_token="$(printf '%s' "$AZURE_ENV_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-6)"
          sub_hash="$(printf '%s' "${{ secrets.AZURE_SUBSCRIPTION_ID }}" | sha256sum | cut -c1-6)"
          name_prefix="${repo_token}-${env_token}-${sub_hash}"
          resource_group="rg-${name_prefix}"
          {
            echo "NAME_PREFIX=${name_prefix}"
            echo "AZURE_RESOURCE_GROUP=${resource_group}"
          } >> "$GITHUB_ENV"

      - name: Create resource group
        run: az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Deploy infrastructure
        id: deploy
        shell: bash
        run: |
          outputs="$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file schedules/infra/azure/main.bicep \
            --parameters \
              location="$AZURE_LOCATION" \
              envName="$AZURE_ENV_NAME" \
              namePrefix="$NAME_PREFIX" \
            --query properties.outputs \
            --output json)"
          webapp_name="$(printf '%s' "$outputs" | jq -r '.webAppName.value')"
          webapp_url="$(printf '%s' "$outputs" | jq -r '.webAppUrl.value')"
          acr_name="$(printf '%s' "$outputs" | jq -r '.containerRegistryName.value')"
          acr_login_server="$(printf '%s' "$outputs" | jq -r '.containerRegistryLoginServer.value')"
          {
            echo "AZURE_WEBAPP_NAME=${webapp_name}"
            echo "AZURE_CONTAINER_REGISTRY=${acr_name}"
            echo "AZURE_CONTAINER_REGISTRY_LOGIN_SERVER=${acr_login_server}"
          } >> "$GITHUB_ENV"
          {
            echo "## Azure infrastructure ready"
            echo ""
            echo "- Resource group: \`${AZURE_RESOURCE_GROUP}\`"
            echo "- Web app: \`${webapp_name}\`"
            echo "- URL: ${webapp_url}"
            echo "- Container registry: \`${acr_name}\`"
            echo "- First app deploy will replace the placeholder container image."
          } >> "$GITHUB_STEP_SUMMARY"
